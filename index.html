            <path d="M20.45 20.45h-3.55v-5.57c0-1.33-.03-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.36V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.45v6.29zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM7.12 20.45H3.56V9h3.56v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.73v20.54C0 23.22.79 24 1.77 24h20.45C23.2 24 24 23.22 24 22.27V1.73C24 .77 23.2 0 22.22 0z"/>
          </svg>

        label: "GitHub",
        href: "https://github.com/landon517",
        svg: (
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
            <path d="M12 .3a12 12 0 0 0-3.79 23.4c.6.1.82-.26.82-.57v-2.2c-3.34.72-4.04-1.6-4.04-1.6-.54-1.38-1.33-1.75-1.33-1.75-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.48 1 .11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.17 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 6 0c2.29-1.55 3.3-1.23 3.3-1.23.66 1.65.25 2.87.12 3.17.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.21.68.82.57A12 12 0 0 0 12 .3z"/>

    /* ─── SCROLL OBSERVER HOOK ──────────────────────────── */
    function useInView(threshold = 0.15) {
      const ref = useRef(null);
      const [inView, setInView] = useState(false);
      useEffect(() => {
        const obs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting) setInView(true);
        }, { threshold });
        if (ref.current) obs.observe(ref.current);
        return () => obs.disconnect();
      }, []);
      return [ref, inView];
    }

    /* ─── COMPONENTS ─────────────────────────────────────── */

    function SocialMenu() {
      const [open, setOpen] = useState(false);
      return (
        <div
          className="nav-btn left"
          onMouseEnter={() => setOpen(true)}

          <div className={`dropdown left-drop ${open ? "visible" : ""}`}>
            {socials.map(s => (
              <a key={s.label} href={s.href} className="drop-item">

                <span>{s.label}</span>
              </a>
            ))}
          </div>
        </div>
      );
    }

    function LinksMenu() {
      const [open, setOpen] = useState(false);
      return (

          className="nav-btn right"
          onMouseEnter={() => setOpen(true)}

          <div className={`dropdown right-drop ${open ? "visible" : ""}`}>

                {l.svg}
                <span>{l.label}</span>
              </a>
            ))}

        </div>
      );
    }

    function HeroSection() {

    function AboutSection() {
      const [ref, inView] = useInView();

        <section className="about section" id="about" ref={ref}>

              <h2 className="section-heading">A little<br/><em>about myself.</em></h2>
              <p>
                I'm a Computer Science student at <strong>Texas A&amp;M University</strong> with a passion for creating. I love diving into problems and finding inventive solutions.
              </p>
              <p>
                When I'm not writing code, you'll find me exploring the city, playing a good match of pickleball, or writing stories and scripts. I believe in building people-oriented projects that make a difference.
              </p>
              <div className="about-tags">
                <span className="tag">Full-Stack Development</span>
                <span className="tag">C++ Programmer</span>
                <span className="tag">Leadership</span>
                <span className="tag">Creative Development</span>
              </div>
            </div>
            <div className="about-photo">
              <div className="photo-frame">
                <img src="Senior2024_13.JPEG" alt="Landon" />
              </div>
              <div className="photo-deco"></div>
            </div>
          </div>
        </section>
      );
    }

    function ProjectCard({ project, index }) {
      const [ref, inView] = useInView(0.1);
      return (
        <div
          ref={ref}
          className={`project-card fade-up ${inView ? "visible" : ""}`}
          style={{ transitionDelay: `${index * 0.12}s` }}
        >
          <span className="project-num">{project.num}</span>
          <div className="project-body">
            <h3 className="project-title">{project.title}</h3>
            <p className="project-desc">{project.desc}</p>
            <div className="project-tech">
              {project.tech.map(t => <span key={t} className="tech-pill">{t}</span>)}
            </div>
          </div>
          <a href={project.link} className="project-arrow" aria-label="View project">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="22" height="22">
              <path d="M7 17L17 7M17 7H7M17 7v10"/>
            </svg>
          </a>
        </div>
      );
    }

    function ProjectsSection() {
      const [ref, inView] = useInView();

        <section className="projects section" id="projects">

    function Footer() {
